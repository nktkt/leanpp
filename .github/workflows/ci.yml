name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Lake build + test suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Lean toolchain
        uses: leanprover/lean-action@v1
        with:
          # `lean-action` reads the version from `lean-toolchain` by default.
          # Skip its built-in `lake build` so we can drive build + tests
          # together via the project's regression script.
          build: false
          test: false
          lint: false
          # The action's GitHub cache step keys on `github.sha`, which
          # makes every commit a fresh save and triggers a "Cache save
          # failed" warning on every run. Lean++'s build finishes in
          # ~50 s without cache; the savings aren't worth the noise,
          # so disable until upstream changes the keying.
          use-github-cache: false

      - name: lake build (LeanPP stdlib)
        run: lake build

      - name: tests/run.sh (elaboration + CLI smoke)
        run: bash tests/run.sh
